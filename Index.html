<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>دکتر عادله کبریایی</title>

<style>

*{
    box-sizing:border-box;
    font-family:Tahoma, Arial, sans-serif;
}

body{
    margin:0;
    min-height:100vh;
    background:linear-gradient(135deg,#ffffff,#f1f1f1,#e8e0c8);
    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    width:90%;
    max-width:420px;
    background:rgba(255,255,255,0.85);
    border-radius:30px;
    padding:35px 25px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,0.15);
    backdrop-filter:blur(10px);
}


.profile{
    width:120px;
    height:120px;
    border-radius:50%;
    background:#ddd;
    margin:auto;
    border:4px solid #b8954b;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#777;
    font-size:14px;
}


h1{
    margin-top:25px;
    margin-bottom:8px;
    color:#222;
    font-size:25px;
}


.title{
    color:#8b6b2d;
    font-size:18px;
    margin-bottom:10px;
}


.code{
    color:#555;
    font-size:15px;
    margin-bottom:30px;
}


.button{
    display:block;
    text-decoration:none;
    color:white;
    background:#222;
    margin:14px 0;
    padding:15px;
    border-radius:18px;
    transition:0.3s;
    font-size:17px;
}


.button:hover{
    background:#b8954b;
}


.footer{
    margin-top:25px;
    font-size:12px;
    color:#777;
}

</style>

</head>


<body>

<div class="card">


<div class="profile">
عکس
</div>


<h1>
دکتر عادله کبریایی
</h1>


<div class="title">
جراح و دندان پزشک
</div>


<div class="code">
ن.پ: ۱۱۱۱۱۱
</div>


<a class="button" href="https://www.instagram.com/dr.kebriaeii?igsh=cTlmZTAxcmx0aHZ4">
📸 اینستاگرام
</a>


<a class="button" href="#">
✈️ تلگرام
</a>


<a class="button" href="#">
☎️ تماس
</a>


<a class="button" href="#">
💬 واتساپ
</a>


<div class="footer">
Digital Business Card
</div>


</div>

</body>
</html>
