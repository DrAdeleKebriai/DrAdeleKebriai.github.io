<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title> 🦷🪥دکتر عادله کبریایی</title>

<style>

*{
    box-sizing:border-box;
    font-family:Tahoma, Arial, sans-serif;
}
body{
    margin:0;
    min-height:100vh;
    background:
    radial-gradient(circle at top left,#fff3b0,transparent 30%),
    radial-gradient(circle at bottom right,#ffd6e7,transparent 35%),
    linear-gradient(135deg,#dff6ff,#ffffff,#e8fff0);
    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    width:90%;
    max-width:420px;
    background:#c9e4ca;
    border-radius:35px;
    padding:35px 25px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,0.12);
    backdrop-filter:blur(10px);
}


h1{
    margin-top:25px;
    margin-bottom:8px;
    color:#222;
    font-size:25px;
}


.title{
    color:#8b6b2d;
    font-size:18px;
    margin-bottom:10px;
}


.code{
    color:#555;
    font-size:15px;
    margin-bottom:30px;
}


.button{
    display:block;
    text-decoration:none;
    color:#222;
    background:#3b6064;
    border:2px solid #ace7ff;
    margin:14px 0;
    padding:15px;
    border-radius:35px;
    transition:0.3s;
    font-size:17px;
    font-weight:bold;
    box-shadow:0 6px 15px rgba(0,0,0,0.08);
}

.button:hover{
    transform:scale(1.03);
    background:#fff8dc;
}

 .text-card{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    background:#c9e4ca;
    border-radius:35px;
    padding:35px 25px;
    box-shadow:0 15px 40px rgba(0,0,0,.12);

    opacity:0;
    transform:translateX(100%);
    transition:all .45s ease;
    pointer-events:none;
}

.text-card.show{
    opacity:1;
    transform:translateX(0);
    pointer-events:auto;
}

.card{
    transition:all .45s ease;
}

.card.hide{
    opacity:0;
    transform:translateX(-100%);
    pointer-events:none;
}   

.profile{
    width:70px;
    height:65px;
    border-radius:50%;
    overflow:hidden;
    margin:auto;
    border:1px solid #ace7ff;
    background:#fff;
}


.profile img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.footer{
    margin-top:25px;
    font-size:12px;
    color:#777;
}

</style>

</head>


<body>

<div class="card">



<h1>
👩🏻‍⚕️دکتر عادله کبریایی👩🏻‍🚀
</h1>


<div class="title">
</div>


<div class="code">

    
</div>

<a class="button"
onclick="showCard('عنوان مطلب','اینجا متن کامل مطلب قرار می‌گیرد...');return false;">
دکمه
</a>

<a class="button" href="#">
  مراقبت‌های پس از ترمیم
</a>

<a class="button" href="#">
  مراقبت‌های پس از کشیدن
</a>

<a class="button" href="#">
  مراقبت‌های پس از فلورایدتراپی
</a>

<a class="button" href="#">
  مراقبت‌های پس از فضا نگه‌دار
</a>

<a class="button" href="#">
  بازگشت
</a>
    
<div class="profile">
    <img src="Logo.png" alt="دکتر عادله کبریایی">
</div>

<div class="footer">
Digital Business Card powered by TheOzCo.
</div>


</div>

</body>
  </html>
