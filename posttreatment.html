<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🦷🪥دکتر عادله کبریایی</title>

<style>

*{
    box-sizing:border-box;
    font-family:Tahoma, Arial, sans-serif;
}

body{
    margin:0;
    min-height:100vh;
    background:
    radial-gradient(circle at top left,#fff3b0,transparent 30%),
    radial-gradient(circle at bottom right,#ffd6e7,transparent 35%),
    linear-gradient(135deg,#dff6ff,#ffffff,#e8fff0);

    display:flex;
    justify-content:center;
    align-items:center;
}


.container{
    position:relative;
    width:90%;
    max-width:420px;
}


.card{
    width:100%;
    background:#c9e4ca;
    border-radius:35px;
    padding:35px 25px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,.12);
    transition:.45s ease;
}


.card.hide{
    opacity:0;
    transform:translateX(-100%);
    pointer-events:none;
}


h1{
    margin-top:25px;
    margin-bottom:8px;
    color:#222;
    font-size:25px;
}


.button{
    display:block;
    text-decoration:none;
    color:#222;
    background:#3b6064;
    border:2px solid #ace7ff;
    margin:14px 0;
    padding:15px;
    border-radius:35px;
    transition:.3s;
    font-size:17px;
    font-weight:bold;
}


.button:hover{
    transform:scale(1.03);
    background:#fff8dc;
}


.text-card{
    position:absolute;
    top:0;
    left:0;

    width:100%;
    max-height:85vh;
    overflow-y:auto;

    background:#c9e4ca;
    border-radius:35px;
    padding:35px 25px;

    box-shadow:0 15px 40px rgba(0,0,0,.12);

    opacity:0;
    transform:translateX(100%);

    transition:.45s ease;

    pointer-events:none;
}


.text-card.show{
    opacity:1;
    transform:translateX(0);
    pointer-events:auto;
}


#textTitle{
    font-size:22px;
    margin-bottom:20px;
}


#textContent{
    text-align:right;
    line-height:2;
    font-size:16px;
}


.profile{
    width:70px;
    height:65px;
    border-radius:50%;
    overflow:hidden;
    margin:auto;
    border:1px solid #ace7ff;
}


.profile img{
    width:100%;
    height:100%;
    object-fit:cover;
}


.footer{
    margin-top:25px;
    font-size:12px;
    color:#777;
}

</style>

</head>


<body>


<div class="container">


<div class="card">

</div>

<script>

function showCard(title,text){

    document.querySelector(".card").classList.add("hide");

    document.getElementById("textTitle").innerHTML=title;

    document.getElementById("textContent").innerHTML=text;


    document.getElementById("textCard").classList.add("show");

}



function closeCard(){

    document.getElementById("textCard").classList.remove("show");


    setTimeout(function(){

        document.querySelector(".card").classList.remove("hide");

    },450);

}

</script>
