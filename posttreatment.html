<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🦷🪥دکتر عادله کبریایی</title>

<style>

*{
    box-sizing:border-box;
    font-family:Tahoma, Arial, sans-serif;
}

body{
    margin:0;
    min-height:100vh;
    background:
    radial-gradient(circle at top left,#fff3b0,transparent 30%),
    radial-gradient(circle at bottom right,#ffd6e7,transparent 35%),
    linear-gradient(135deg,#dff6ff,#ffffff,#e8fff0);

    display:flex;
    justify-content:center;
    align-items:center;
}


.container{
    width:90%;
    max-width:420px;
    position:relative;
}


.card{
    width:100%;
    background:#c9e4ca;
    border-radius:35px;
    padding:35px 25px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,.12);
}


h1{
    margin-top:25px;
    margin-bottom:8px;
    color:#222;
    font-size:25px;
}


.button{
    display:block;
    text-decoration:none;
    color:#222;
    background:#3b6064;
    border:2px solid #ace7ff;
    margin:14px 0;
    padding:15px;
    border-radius:35px;
    transition:.3s;
    font-size:17px;
    font-weight:bold;
}


.button:hover{
    transform:scale(1.03);
    background:#fff8dc;
}


.text-card{
    position:absolute;
    top:0;
    left:0;

    width:100%;
    max-height:85vh;
    overflow-y:auto;

    background:#c9e4ca;
    border-radius:35px;
    padding:35px 25px;

    box-shadow:0 15px 40px rgba(0,0,0,.12);

    opacity:0;
    transform:translateX(100%);
    transition:.45s ease;

    pointer-events:none;
}


.text-card.show{
    opacity:1;
    transform:translateX(0);
    pointer-events:auto;
}


#textContent{
    line-height:2;
    text-align:right;
}


.profile{
    width:70px;
    height:65px;
    border-radius:50%;
    overflow:hidden;
    margin:auto;
}


.profile img{
    width:100%;
    height:100%;
    object-fit:cover;
}


.footer{
    margin-top:25px;
    font-size:12px;
    color:#777;
}

</style>

</head>

<body>


<div class="container">


<div class="card">


<h1>
👩🏻‍⚕️دکتر عادله کبریایی👩🏻‍🚀
</h1>
<!-- دکمه‌ها -->

<a class="button"
onclick="showCard('مراقبت‌های پس از عصب‌کشی و روکش','🔴 تا نیم ساعت پس از درمان کودک از خوردن و آشامیدن و شستن دهان پرهیز کند.<br><br>🔴 برای جلوگیری از زخم شدن لب تا از بین رفتن تاثیر بی حسی خصوصاً در فک پایین (دو ساعت پس از درمان) از خوردن غذاهای جویدنی پرهیز شود و کودک در این زمان تحت نظارت والدین باشد.<br><br>🔴 کودک از خاراندن و جویدن ناحیه بی‌حس شده خودداری کند.<br><br>🔴 کودک تا دو روز پس از درمان از خوردن خوراکی‌های چسبناک خودداری کند.<br><br>🔴 رعایت بهداشت جهت سلامت لثه اطراف دندان درمان شده ضروری است.<br><br>🔴 درد با شدت کم تا دو الی سه روز طبیعی است.');return false;">
مراقبت‌های پس از عصب‌کشی و روکش
</a>


<a class="button"
onclick="showCard('مراقبت‌های پس از ترمیم دندان','🔴 برای جلوگیری از زخم شدن لب تا از بین رفتن تاثیر بی حسی از خوردن غذاهای جویدنی پرهیز شود.<br><br>🔴 کودک از خاراندن و جویدن ناحیه بی‌حس شده خودداری کند.<br><br>🔴 تا یک ساعت پس از درمان از مصرف غذاهای جویدنی خودداری شود.<br><br>🔴 تا دو روز خوراکی‌های چسبناک مصرف نشود.');return false;">
مراقبت‌های پس از ترمیم دندان
</a>


<a class="button"
onclick="showCard('مراقبت‌های پس از کشیدن دندان','🔴 گاز را تا نیم ساعت فشار دهد.<br><br>🔴 تا دو ساعت تف کردن ممنوع است.<br><br>🔴 یک ساعت بعد بستنی یا نوشیدنی خنک مصرف شود.<br><br>🔴 تا ۲۴ ساعت غذای داغ و سفت مصرف نشود.<br><br>🔴 کودک ناحیه بی‌حس را دستکاری نکند.');return false;">
مراقبت‌های پس از کشیدن دندان
</a>


<a class="button"
onclick="showCard('مراقبت‌های پس از فلوراید تراپی','🔴 تا ده دقیقه آب دهان را قورت ندهد.<br><br>🔴 تا یک ساعت خوردن و آشامیدن ممنوع است.<br><br>🔴 یک ساعت بعد یک لیوان شیر مصرف شود.<br><br>🔴 ژل فلوراید از روی دندان کنده نشود.<br><br>🔴 همان شب مسواک زده نشود.');return false;">
مراقبت‌های پس از فلوراید تراپی
</a>


<a class="button"
onclick="showCard('مراقبت‌های پس از فضانگهدار','🔴 هر سه ماه برای چک‌آپ مراجعه شود.<br><br>🔴 از خوردن غذاهای سفت خودداری شود.<br><br>🔴 فضانگهدار با ناخن یا وسایل دستکاری نشود.<br><br>🔴 خوراکی چسبناک مصرف نشود.<br><br>🔴 بهداشت اطراف فضانگهدار رعایت شود.');return false;">
مراقبت‌های پس از فضانگهدار
</a>



<div class="profile">
<img src="Logo.png">
</div>


<div class="footer">
Digital Business Card powered by TheOzCo.
</div>


</div>
<!-- پایان کارت اصلی -->


<!-- کارت بازشو -->

<div id="textCard" class="text-card">

<h2 id="textTitle"></h2>

<div id="textContent"></div>

<a class="button" href="#" onclick="closeCard();return false;">
🔙 بازگشت
</a>

</div>


</div>



<script>

function showCard(title,text){

    document.getElementById("textTitle").innerHTML = title;

    document.getElementById("textContent").innerHTML = text;

    document.getElementById("textCard").classList.add("show");

}



function closeCard(){

    document.getElementById("textCard").classList.remove("show");

}


</script>


</body>
</html>
