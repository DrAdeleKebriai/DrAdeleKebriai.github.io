<style>

*{
    box-sizing:border-box;
    font-family:Tahoma, Arial, sans-serif;
}
body{
    margin:0;
    min-height:100vh;
    background:
    radial-gradient(circle at top left,#fff3b0,transparent 30%),
    radial-gradient(circle at bottom right,#ffd6e7,transparent 35%),
    linear-gradient(135deg,#dff6ff,#ffffff,#e8fff0);
    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    width:90%;
    max-width:420px;
    background:#eaf8ff;
    border-radius:35px;
    padding:35px 25px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,0.12);
    backdrop-filter:blur(10px);
}


h1{
    margin-top:25px;
    margin-bottom:8px;
    color:#222;
    font-size:25px;
}


.title{
    color:#8b6b2d;
    font-size:18px;
    margin-bottom:10px;
}


.code{
    color:#555;
    font-size:15px;
    margin-bottom:30px;
}


.button{
    display:block;
    text-decoration:none;
    color:#555;
    background:#FFC0CB;
    border:2px solid #ffd166;
    margin:14px 0;
    padding:15px;
    border-radius:35px;
    transition:0.3s;
    font-size:17px;
    font-weight:bold;
    box-shadow:0 6px 15px rgba(0,0,0,0.08);
}

.button:hover{
    transform:scale(1.03);
    background:#fff8dc;
}


.profile{
    width:130px;
    height:130px;
    border-radius:50%;
    overflow:hidden;
    margin:auto;
    border:5px solid #ffd166;
    background:#fff;
}


.profile img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.footer{
    margin-top:25px;
    font-size:12px;
    color:#777;
}

</style>

</head>
